name: daily

on:
  # Every day at 12:00 UTC = 20:00 Asia/Taipei.
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      full:
        description: "Force full re-extraction (ignore seen_posts.json)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Write .env from secrets
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          {
            echo "APIFY_TOKEN=$APIFY_TOKEN"
            echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY"
          } > .env

      - name: Scrape
        run: node scripts/scrape.mjs

      - name: Extract
        run: |
          if [ "${{ inputs.full }}" = "true" ]; then
            node scripts/extract.mjs --full
          else
            node scripts/extract.mjs
          fi

      - name: Render week
        run: node scripts/render_week.mjs

      - name: Render month
        run: node scripts/render_month.mjs

      - name: Upload raw artifacts
        uses: actions/upload-artifact@v4
        with:
          name: data-${{ github.run_id }}
          path: |
            data/posts.json
            data/events.json
            data/seen_posts.json
            data/weeks/
            data/months/

      - name: Commit digests back to main
        run: |
          git config user.name "runclubs-bot"
          git config user.email "runclubs-bot@users.noreply.github.com"
          git add data/weeks/ data/months/ data/seen_posts.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "daily: $(date -u +%Y-%m-%d) digest"
            git push
          fi
